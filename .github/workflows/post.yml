name: Telegram Ad Bot
on:
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install telethon -q
      - run: echo "$TG_SESSION" > session.txt && python bot.py
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
